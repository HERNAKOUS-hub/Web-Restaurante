<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>La Tintorería - Reserva</title>
    <link rel="stylesheet" href="Reserva.css" />
    <link rel="icon" type="png" href="img/LaTintoreriaIcon.png" />
  </head>
  <body>
    <div id="preloader">
      <img src="img/LaTintoreriaLogo.png" alt="Cargando..." />
    </div>

    <header>
      <nav>
        <div class="logo-img">
          <a href="Inicio.html"><img src="img/LaTintoreriaLogo.png" alt="Logo La Tintorería" /></a>
        </div>
        <div class="nav-container">
          <ul class="nav-links">
            <li><a href="Carta.html">Carta</a></li>
            <li><a href="Bodega.html">La Bodega</a></li>
            <li><a href="Reserva.html" class="active">Reserva</a></li>
            <li><a href="Contacto.html">Contacto</a></li>
          </ul>
          
          <div class="language-selector">
            <a href="Reserva.html" class="lang-button active" onclick="setLanguage('es')">
              <img src="img/BanderaEspaña.webp" alt="Bandera de España" title="Español" />
            </a>
            <a href="Booking.html" class="lang-button" onclick="setLanguage('en')">
              <img src="img/BanderaReinoUnido.png" alt="Bandera de Reino Unido" title="English" />
            </a>
          </div>
        </div>
      </nav>
    </header>

    <div class="spacer"></div>

    <section class="reservation-container">
      <h1 class="fade-element">Reserva tu Mesa</h1>
      <p class="reserva-intro fade-element">Vive la experiencia gastronómica de La Tintorería. Asegura tu lugar con antelación.</p>
      
      <form class="reservation-form fade-element">
        <div class="form-group grupo-input">
          <input type="text" id="name" name="name" class="input-flotante" required>
          <label for="name" class="label-flotante">Nombre Completo</label>
        </div>

        <div class="form-row">
          <div class="form-group grupo-input">
            <input type="email" id="email" name="email" class="input-flotante" required>
            <label for="email" class="label-flotante">Correo Electrónico</label>
          </div>
          <div class="form-group grupo-input">
            <input type="tel" id="phone" name="phone" class="input-flotante" required>
            <label for="phone" class="label-flotante">Teléfono</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group grupo-input">
            <input type="text" id="date" name="date" class="input-flotante" onfocus="(this.type='date')" onblur="(this.value == '' ? this.type='text' : this.type='date')" required>
            <label for="date" class="label-flotante">Fecha</label>
          </div>
          <div class="form-group grupo-input">
            <input type="text" id="time" name="time" class="input-flotante" onfocus="(this.type='time')" onblur="(this.value == '' ? this.type='text' : this.type='time')" required>
            <label for="time" class="label-flotante">Hora</label>
          </div>
          <div class="form-group grupo-input select-grupo">
            <select id="guests" name="guests" class="input-flotante" required>
              <option value="" disabled selected hidden></option>
              <option value="1">1 Persona</option>
              <option value="2">2 Personas</option>
              <option value="3">3 Personas</option>
              <option value="4">4 Personas</option>
              <option value="5">5 Personas</option>
              <option value="6">6+ Personas (Llamar al restaurante)</option>
            </select>
            <label for="guests" class="label-flotante">Comensales</label>
          </div>
        </div>

        <div class="form-group grupo-input">
          <textarea id="comments" name="comments" class="input-flotante textarea-flotante" required></textarea>
          <label for="comments" class="label-flotante">Observaciones (Alergias, peticiones...)</label>
        </div>

        <button type="submit" class="btn-reserva">Confirmar Reserva</button>
      </form>
    </section>

    <footer class="footer-vino fade-element">
      <div class="footer-content">
        <img src="img/PiePagina.png" alt="Pie de Página Decorativo" />
      </div>
    </footer>

    <div class="copyright-bar">
      <p>© Copyright - La Tintorería - powered by <strong>Hernan Fernandez</strong></p>
    </div>

    <script>
      window.addEventListener("load", function () {
        setTimeout(function () {
          const preloader = document.getElementById("preloader");
          preloader.classList.add("hidden");
          setTimeout(() => { preloader.style.display = "none"; }, 300);
        }, 500);
      });

      function setLanguage(lang) {
        console.log("Idioma cambiado a: " + lang);
      }

      // --- ANIMACIÓN SCROLL (FADE IN/OUT) ---
      document.addEventListener("DOMContentLoaded", () => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.classList.add('visible'); } 
            else { entry.target.classList.remove('visible'); }
          });
        }, { threshold: 0.15 });

        document.querySelectorAll('.fade-element').forEach((el) => observer.observe(el));
      });
    </script>
  </body>
</html>
